<!DOCTYPE html>
<html lang="hu">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dobókocka Párbaj</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <header class="fejlec">
        <h1 class="fejlec__cim">Dobókocka Párbaj</h1>
        <p class="fejlec__alcim">Szerencse kérdése</p>
    </header>


    <section class="arena">

        <div class="jatekos-kartya" id="jatekos1-kartya">
            <span class="jatekos-kartya__cimke">Játékos</span>
            <span class="jatekos-kartya__nev">Anna</span>
            <img
                class="jatekos-kartya__kocka"
                id="kocka1-kep"
                src="kepek/kocka1.svg"
                alt="Anna kockája"
            >
            <span class="jatekos-kartya__szam" id="jatekos1-szam">—</span>
        </div>

        <div class="vs-jelveny" aria-hidden="true">VS</div>

        <div class="jatekos-kartya" id="jatekos2-kartya">
            <span class="jatekos-kartya__cimke">Játékos</span>
            <span class="jatekos-kartya__nev">Béla</span>
            <img
                class="jatekos-kartya__kocka"
                id="kocka2-kep"
                src="kepek/kocka1.svg"
                alt="Béla kockája"
            >
            <span class="jatekos-kartya__szam" id="jatekos2-szam">—</span>
        </div>

    </section>

    <section class="statisztika">

        <div class="stat-cella">
            <p class="stat-cella__cimke">Anna nyert</p>
            <p class="stat-cella__ertek stat-cella__ertek--kek" id="stat-anna">0</p>
        </div>

        <div class="stat-cella">
            <p class="stat-cella__cimke">Döntetlen</p>
            <p class="stat-cella__ertek stat-cella__ertek--szurke" id="stat-dontetlen">0</p>
        </div>

        <div class="stat-cella">
            <p class="stat-cella__cimke">Béla nyert</p>
            <p class="stat-cella__ertek stat-cella__ertek--piros" id="stat-bela">0</p>
        </div>   
    </section>

    <p class="eredmeny" id="eredmeny">Nyomd meg a gombot a dobáshoz!</p>

    <button class="dobas-gomb" id="dobas-gomb">Dobás!</button>

    <script src="script.js"></script>
</body>
</html>
